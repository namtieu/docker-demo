name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
          contents: read
          id-token: write   

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '18'

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test

            - name: Login to DockerHub
              run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            - name: Build Docker image
              run: |
                docker build -t namtieu/docker-demo:latest \
                             -t namtieu/docker-demo:${{ github.sha }} .

            - name: Push Docker image
              run: |
                docker push namtieu/docker-demo:latest
                docker push namtieu/docker-demo:${{ github.sha }}

            - name: Deploy to Ubuntu Server
              uses: appleboy/ssh-action@v0.1.3
              with:
                host: ${{ secrets.SERVER_HOST }}
                port: ${{ secrets.SERVER_PORT }}
                username: ${{ secrets.SERVER_USER }}
                key: ${{ secrets.SERVER_SSH_KEY }}
                script: |
                  docker pull ${{ secrets.DOCKER_USERNAME }}/docker-demo:${{ github.sha }}
                  docker rm -f docker-demo || true
                  docker run -d -p 80:3000 --name docker-demo ${{ secrets.DOCKER_USERNAME }}/docker-demo:${{ github.sha }}